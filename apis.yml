description: >-
  .clinerules is the rule-file convention used by the Cline open-source AI
  coding agent. Projects expose persistent guidance to Cline by placing a
  .clinerules/ directory at the repository root containing one or more
  Markdown or text files. Each file may declare optional YAML frontmatter
  to scope its instructions to glob patterns so the agent only loads
  context relevant to the active task. The format is interoperable with
  AGENTS.md, .cursorrules, and .windsurfrules conventions, providing a
  cross-tool standard for codifying coding conventions, architectural
  decisions, and behavioural constraints for AI coding agents.
